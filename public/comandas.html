<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <title>Comandas | Sistema de Gestión</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <header>
        <h1>Mi Turno</h1>
        <div id="status-indicador" style="display: flex; align-items: center; gap: 6px;">
            <svg class="status-icon" width="10" height="10" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="#EF4444"/></svg> Offline
        </div>
    </header>

    <main class="mobile-container">
        <h2 class="section-title">Mapa de Mesas</h2>
        <div class="mesas-grid" id="mesas-container">
            <!-- Renderizado dinámicamente desde app.js -->
        </div>

        <section class="menu-section" id="menu-section">
            <h2 class="section-title">Menú - Mesa <span id="mesa-activa-label"></span></h2>
            
            <div class="category-filters" id="category-filters" style="display:none;">
                <!-- Dinámico -->
            </div>

            <div id="cuenta-previa" style="margin-bottom: 1rem; padding: 1rem; background: var(--secondary-ui); border-radius: 8px; display: none;"></div>
            <div id="productos-container">
                <!-- Renderizado dinámicamente desde app.js -->
            </div>
        </section>
    </main>

    <div class="floating-cart" id="floating-cart">
        <div>
            <span style="opacity: 0.8; font-size: 0.9rem;">Total (Mesa <span id="cart-mesa-label"></span>)</span>
            <div style="font-size: 1.25rem; font-weight: bold;">$<span id="cart-total">0.00</span></div>
        </div>
        <button class="enviar-comanda-btn" id="btn-enviar-comanda">Enviar Orden</button>
    </div>

    <!-- Middleware de sesión y Roles -->
    <script type="module" src="guard.js"></script>

    <!-- Cargar lógica principal del POS -->
    <script type="module" src="app.js"></script>
</body>
</html>
