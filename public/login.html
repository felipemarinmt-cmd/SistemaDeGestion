<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #F2E3B6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #262626;
        }
        .login-card {
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        .login-card h2 {
            margin-top: 0;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-group {
            margin-bottom: 1.25rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f9f9f9;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #262626;
        }
        .btn-ingresar {
            width: 100%;
            padding: 1rem;
            background-color: #EF4444; 
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 0.5rem;
        }
        .btn-ingresar:hover {
            background-color: #DC2626;
        }
        .error-msg {
            color: #EF4444;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Restaurante Manager</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="admin@restaurante.com">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-ingresar" id="btn-submit">Acceder</button>
            <p id="error-message" class="error-msg"></p>
        </form>
    </div>

    <!-- Módulo JS para inicializar control Auth de Supabase -->
    <script type="module" src="login.js"></script>
</body>
</html>
